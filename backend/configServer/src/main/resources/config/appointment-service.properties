spring.application.name=appointment-service
server.port=8085
server.servlet.context-path=/EverCare

# ==================== EUREKA ====================
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true

# ==================== DATASOURCE ====================
spring.datasource.url=jdbc:mysql://localhost:3306/EverCaredb1?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA / HIBERNATE ====================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.init_sql=SET FOREIGN_KEY_CHECKS=0

# ==================== JACKSON ====================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false


