spring.cloud.config.enabled=false
spring.config.import=

server.port=0

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

spring.datasource.url=jdbc:h2:mem:medicalrecorddb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.rabbitmq.dynamic=false

user.service.url=http://localhost:8096/EverCare
user.service.internal-api-key=evercare-internal-key

app.rabbitmq.medical-record.exchange=medical.record.exchange
app.rabbitmq.medical-record.queue=medical.record.queue
app.rabbitmq.medical-record.routing-key=medical.record.events
