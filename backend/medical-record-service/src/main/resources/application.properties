spring.application.name=medical-record-service
spring.config.import=optional:configserver:http://localhost:8888

server.port=8082

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=jdbc:mysql://localhost:3306/EverCaredb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

user.service.url=http://localhost:8096/EverCare
user.service.internal-api-key=evercare-internal-key

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:admin123}

app.rabbitmq.medical-record.exchange=medical.record.exchange
app.rabbitmq.medical-record.queue=medical.record.queue
app.rabbitmq.medical-record.routing-key=medical.record.events
