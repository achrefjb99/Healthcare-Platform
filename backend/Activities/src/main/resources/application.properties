# ==================== SERVICE INFO ====================
spring.application.name=activities-service
server.port=8092

# ==================== CONFIG SERVER ====================
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=false

# ==================== NOTIFICATION SERVICE ====================
notification.service.url=http://localhost:8089/EverCare

# ==================== DATASOURCE (FALLBACK) ====================
spring.datasource.url=jdbc:mysql://localhost:3306/EverCaredb?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

